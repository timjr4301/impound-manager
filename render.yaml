services:
  - type: web
    name: impound-manager
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: COMPANY_NAME
        value: Broad & James Towing
      - key: COMPANY_ADDRESS
        value: 3201 E Broad St, Columbus, OH 43213
      - key: COMPANY_PHONE
        value: (614) 235-4700
      - key: STORAGE_ADDRESS
        value: 3201 E Broad St, Columbus, OH 43213
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: API_KEY
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: CLOUDPOS_TPN
        sync: false
      - key: CLOUDPOS_MERCHANT_ID
        sync: false
      - key: CLOUDPOS_API_KEY
        sync: false
