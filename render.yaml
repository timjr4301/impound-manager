services:
  - type: web
    name: impound-manager
    env: python
    pythonVersion: 3.11.9
    # NOTE: the live service runs on the Starter/1GB instance type set in the
    # Render dashboard (Settings → Instance Type), which overrides this field.
    # Kept here for the record; change the instance type in the dashboard, not here.
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Memory tuning for the 512MB-class instance: fewer concurrent threads
    # (smaller simultaneous spikes) and worker recycling every ~200 requests so
    # accumulated memory is released before it hits the ceiling and OOM-kills.
    # If the Start Command is also set in the Render dashboard, update it there
    # too — the dashboard value overrides this file.
    startCommand: gunicorn -k gthread --threads 4 -w 1 --max-requests 200 --max-requests-jitter 30 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: COMPANY_NAME
        value: Broad & James Towing
      - key: COMPANY_ADDRESS
        value: 3201 E Broad St, Columbus, OH 43213
      - key: COMPANY_PHONE
        value: (614) 235-4700
      - key: STORAGE_ADDRESS
        value: 3201 E Broad St, Columbus, OH 43213
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: API_KEY
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: CLOUDPOS_TPN
        sync: false
      - key: CLOUDPOS_MERCHANT_ID
        sync: false
      - key: CLOUDPOS_API_KEY
        sync: false
      - key: UPS_CLIENT_ID
        sync: false
      - key: UPS_CLIENT_SECRET
        sync: false
      - key: UPS_ACCOUNT_NUMBER
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_CLAIM_EMAIL
        value: timjr4301@gmail.com
