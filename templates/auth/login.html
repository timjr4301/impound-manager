<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Impound Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; }
    .login-card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
    .brand-icon { font-size: 3rem; }
  </style>
</head>
<body>
<div class="container" style="max-width:420px;">
  <div class="card login-card p-4">
    <div class="text-center mb-4">
      <div class="brand-icon">🚛</div>
      <h2 class="fw-bold mt-2 mb-0">Impound Manager</h2>
      <div class="text-muted small">Broad &amp; James Towing</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" autofocus
               autocomplete="username" placeholder="heather / tina / dispatcher / tim">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control"
               autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign In</button>
    </form>
  </div>
</div>
</body>
</html>
