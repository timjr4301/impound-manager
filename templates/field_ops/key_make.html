<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Key — {{ vehicle.display_name }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; min-height:100%; background:#0d1117; color:#f0f2f5;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; -webkit-tap-highlight-color:transparent; }
  header { display:flex; align-items:center; gap:12px; padding:14px 18px; background:#161b22; border-bottom:1px solid #2a2f38; }
  header a.back { color:#9aa4b2; text-decoration:none; font-size:1.3rem; }
  header .brand { font-weight:700; font-size:1rem; }
  main { padding:18px 16px 48px; max-width:480px; margin:0 auto; }
  .name { font-size:1.3rem; font-weight:700; margin:0 0 4px; }
  .meta { color:#9aa4b2; font-size:.9rem; margin:0 0 24px; }
  .label { font-weight:700; font-size:1rem; margin:0 0 10px; }
  select, textarea, input[type=number] { width:100%; background:#161b22; border:1px solid #2a2f38; color:#f0f2f5;
    border-radius:12px; padding:15px; font-size:1.05rem; margin-bottom:22px; }
  #holderWrap { display:none; }
  .submit { width:100%; border:none; border-radius:16px; padding:20px; font-size:1.2rem; font-weight:700;
    background:#2fb673; color:#fff; cursor:pointer; margin-bottom:14px; }
  .nokey { width:100%; border:2px solid #e5534b; border-radius:14px; padding:14px; font-size:1rem; font-weight:700;
    background:transparent; color:#ff9d97; cursor:pointer; }
  .hint { color:#9aa4b2; font-size:.82rem; margin:-14px 0 22px; }
</style>
</head>
<body>
<header>
  <a class="back" href="{{ url_for('field_ops.keys') }}"><i class="bi bi-arrow-left"></i></a>
  <div class="brand">Make Key</div>
</header>
<main>
  <div class="name">{{ vehicle.display_name }}</div>
  <div class="meta">
    {% if vehicle.plate %}{{ vehicle.plate }}{% if vehicle.plate_state %} / {{ vehicle.plate_state }}{% endif %} · {% endif %}
    {{ vehicle.color or '' }}
  </div>

  <form method="post" action="{{ url_for('field_ops.key_make', vehicle_id=vehicle.id) }}" id="keyForm">
    <input type="hidden" name="action" value="made">

    <div class="label"><i class="bi bi-key"></i> Key type</div>
    <select name="key_type">
      {% for kt in key_types %}<option value="{{ kt }}">{{ kt }}</option>{% endfor %}
    </select>

    <div class="label"><i class="bi bi-cash"></i> Key cost ($)</div>
    <input type="number" step="1" name="key_cost" placeholder="e.g. 50">
    <div class="hint">Generic ~$50 · BMW / luxury can run $600–800.</div>

    <div class="label"><i class="bi bi-geo"></i> Where did the key go?</div>
    <select name="key_location" id="keyLocSel" onchange="toggleHolder()">
      <option value="">— select —</option>
      {% for key, label in key_locations %}
        {% if key != 'NONE' %}<option value="{{ key }}">{{ label }}</option>{% endif %}
      {% endfor %}
    </select>

    <div id="holderWrap">
      <div class="label"><i class="bi bi-123"></i> Holder number</div>
      <input type="number" name="holder" placeholder="Service key-holder #">
    </div>

    <div class="label"><i class="bi bi-chat-left-text"></i> Notes</div>
    <textarea name="notes" rows="2" placeholder="Optional"></textarea>

    <button type="submit" class="submit"><i class="bi bi-check-circle me-1"></i> Key Made</button>
  </form>

  <form method="post" action="{{ url_for('field_ops.key_make', vehicle_id=vehicle.id) }}"
        onsubmit="return confirm('Send to Junk — Pending (no key possible)?');">
    <input type="hidden" name="action" value="no_key">
    <button type="submit" class="nokey"><i class="bi bi-x-octagon me-1"></i> Can't make a key</button>
  </form>
</main>

<script>
  function toggleHolder() {
    document.getElementById('holderWrap').style.display =
      document.getElementById('keyLocSel').value === 'SERVICE_HOLDER' ? 'block' : 'none';
  }
</script>
</body>
</html>
