{% extends 'base.html' %}
{% block title %}Add Driver — Impound Manager{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
  <a href="{{ url_for('drivers.dashboard') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
  <h2 class="h4 mb-0 fw-bold">Add Driver</h2>
</div>
<div class="card shadow-sm" style="max-width:500px;">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name *</label>
        <input type="text" name="name" class="form-control" required placeholder="First Last">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Cell Phone (for SMS)</label>
        <input type="tel" name="phone" class="form-control" placeholder="+16145550000">
        <div class="form-text">Include country code (+1) for Twilio. Used for Friday SMS.</div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Towbook Driver ID</label>
        <input type="text" name="towbook_driver_id" class="form-control" placeholder="Optional — for matching timecards">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Notes</label>
        <textarea name="notes" class="form-control" rows="2"></textarea>
      </div>
      <button type="submit" class="btn btn-success w-100">Add Driver</button>
    </form>
  </div>
</div>
{% endblock %}
