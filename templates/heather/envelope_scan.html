{% extends 'base.html' %}
{% block title %}Envelope Scan — Impound Manager{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
  <a href="{{ url_for('heather.dashboard') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="h4 mb-0 fw-bold"><i class="bi bi-camera me-2"></i>Envelope Scan Intake</h2>
</div>

<div class="row g-4">
  <div class="col-md-6">

    {# ── IPEVO Camera Capture ── #}
    <div class="card shadow-sm mb-4">
      <div class="card-header fw-semibold">
        <i class="bi bi-camera-video me-2"></i>IPEVO Camera — Auto-Read Envelope
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">Select Vehicle</label>
          <select id="cameraVehicleId" class="form-select">
            <option value="">— select vehicle —</option>
            {% for v in vehicles %}
            <option value="{{ v.id }}">{{ v.display_name }} ({{ v.plate or v.vin or '#'+v.id|string }})</option>
            {% endfor %}
          </select>
        </div>

        <video id="cameraFeed" width="100%" height="auto" autoplay muted
               style="border-radius:8px;background:#000;display:none;"></video>
        <canvas id="captureCanvas" style="display:none;"></canvas>
        <img id="capturedImage" style="display:none;width:100%;border-radius:8px;border:2px solid #198754;" alt="Captured envelope">

        <div class="d-flex gap-2 mt-3 flex-wrap">
          <button id="btnStartCamera" class="btn btn-outline-secondary btn-sm" onclick="startCamera()">
            <i class="bi bi-camera-video"></i> Start Camera
          </button>
          <button id="btnCapture" class="btn btn-primary btn-sm" onclick="captureFrame()" style="display:none;">
            <i class="bi bi-camera"></i> Capture Envelope
          </button>
          <button id="btnProcess" class="btn btn-success btn-sm" onclick="processImage()" style="display:none;">
            <i class="bi bi-magic"></i> Read with AI
          </button>
          <button id="btnRetake" class="btn btn-outline-secondary btn-sm" onclick="retakePhoto()" style="display:none;">
            Retake
          </button>
        </div>

        <div id="aiResult" class="mt-3" style="display:none;">
          <div class="alert alert-info py-2 small" id="aiResultContent"></div>
        </div>
      </div>
    </div>

  </div>
  <div class="col-md-6">

    {# ── Manual Entry ── #}
    <div class="card shadow-sm mb-4">
      <div class="card-header fw-semibold">
        <i class="bi bi-keyboard me-2"></i>Manual Entry
      </div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('heather.envelope_scan') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Vehicle</label>
            <select name="vehicle_id" class="form-select" required>
              <option value="">— select vehicle —</option>
              {% for v in vehicles %}
              <option value="{{ v.id }}">{{ v.display_name }} ({{ v.plate or v.vin or '#'+v.id|string }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Tracking Number</label>
            <input type="text" name="tracking_number" id="manualTracking" class="form-control font-monospace"
                   placeholder="9400111899223823610000" autocomplete="off">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Status</label>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="is_delivered" id="chkDelivered">
              <label class="form-check-label" for="chkDelivered">Delivered</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="return_to_sender" id="chkRTS">
              <label class="form-check-label" for="chkRTS">Return to Sender</label>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Notes</label>
            <input type="text" name="notes" class="form-control" placeholder="e.g. Delivered per USPS, RTS — bad address">
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-save"></i> Save Scan Record
          </button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let stream = null;
let capturedB64 = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: 'environment' }
    });
    const video = document.getElementById('cameraFeed');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('btnStartCamera').style.display = 'none';
    document.getElementById('btnCapture').style.display = 'inline-block';
  } catch (err) {
    alert('Camera access failed: ' + err.message + '\nMake sure IPEVO is connected and browser has camera permission.');
  }
}

function captureFrame() {
  const video = document.getElementById('cameraFeed');
  const canvas = document.getElementById('captureCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  capturedB64 = canvas.toDataURL('image/jpeg', 0.9);

  const img = document.getElementById('capturedImage');
  img.src = capturedB64;
  img.style.display = 'block';
  video.style.display = 'none';

  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

  document.getElementById('btnCapture').style.display = 'none';
  document.getElementById('btnProcess').style.display = 'inline-block';
  document.getElementById('btnRetake').style.display = 'inline-block';
}

function retakePhoto() {
  document.getElementById('capturedImage').style.display = 'none';
  document.getElementById('btnProcess').style.display = 'none';
  document.getElementById('btnRetake').style.display = 'none';
  document.getElementById('btnStartCamera').style.display = 'inline-block';
  document.getElementById('aiResult').style.display = 'none';
  capturedB64 = null;
}

async function processImage() {
  const vehicleId = document.getElementById('cameraVehicleId').value;
  if (!capturedB64) { alert('No image captured.'); return; }

  const btn = document.getElementById('btnProcess');
  btn.disabled = true;
  btn.textContent = '⏳ Reading with AI...';

  try {
    const resp = await fetch('{{ url_for("heather.envelope_scan_camera") }}', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: capturedB64, vehicle_id: vehicleId || null }),
    });
    const data = await resp.json();

    const resultDiv = document.getElementById('aiResult');
    const content = document.getElementById('aiResultContent');
    resultDiv.style.display = 'block';

    if (data.ok) {
      const r = data.result;
      let html = '<strong>AI Read Results:</strong><br>';
      if (r.tracking_number) {
        html += `<b>Tracking #:</b> ${r.tracking_number}<br>`;
        document.getElementById('manualTracking').value = r.tracking_number;
      }
      if (r.is_delivered) html += '✅ <b>Delivered</b><br>';
      if (r.is_return_to_sender) html += '↩️ <b>Return to Sender</b><br>';
      if (r.delivery_date) html += `📅 Delivery date: ${r.delivery_date}<br>`;
      if (r.notes) html += `Notes: ${r.notes}`;
      content.innerHTML = html;
      content.className = 'alert alert-success py-2 small';
    } else {
      content.innerHTML = `Error: ${data.error}`;
      content.className = 'alert alert-danger py-2 small';
    }
  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🔮 Read with AI';
  }
}
</script>
{% endblock %}
